<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By Daniil — Сборка модов для Peaks of Yore</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .page {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Background */
        .bg {
            position: absolute;
            inset: 0;
            background: url('images.jpg') center/cover no-repeat;
            z-index: 0;
        }

        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(20, 10, 40, 0.55);
            z-index: 1;
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 200, 100, 0.6);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            max-width: 900px;
            padding: 40px;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffd699;
            margin-bottom: 30px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 10px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }

        h1 .highlight {
            background: linear-gradient(135deg, #ffd699, #ff8c42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .description-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px 40px;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .description-box p {
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff8c42, #ffd699);
            color: #1a0a2e;
            box-shadow: 0 8px 30px rgba(255, 140, 66, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 140, 66, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            z-index: 2;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .content { padding: 20px; }
            .description-box { padding: 20px 24px; }
            .btn { padding: 14px 28px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="bg"></div>

        <div class="particles" id="particles"></div>

        <div class="content">
            <div class="game-badge">Peaks of Yore</div>

            <h1><span class="highlight">By Daniil</span></h1>

            <p class="subtitle">Сборка модов для покорения вершин</p>

            <div class="description-box">
                <p>Сборка создана <strong>Даниилом</strong>. Включает лучшие моды для игры Peaks of Yore — расширяй возможности альпиниста, открывай новые горизонты и покоряй вершины по-своему!</p>
            </div>

            <div class="btn-group">
                <a href="https://thunderstore.io/c/peaks-of-yore/p/ByDaniil/" class="btn btn-primary" target="_blank">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Скачать на Thunderstore
                </a>
                <a href="https://store.steampowered.com/app/2236070/Peaks_of_Yore/" class="btn btn-secondary" target="_blank">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    Страница игры в Steam
                </a>
            </div>
        </div>

        <div class="footer">By Daniil · Peaks of Yore Modpack</div>
    </div>

    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.animationDuration = (6 + Math.random() * 6) + 's';
            p.style.width = (2 + Math.random() * 4) + 'px';
            p.style.height = p.style.width;
            particlesContainer.appendChild(p);
        }
    </script>
</body>
</html>
