<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Simulator - Pride M3.5 | Bass OS</title>
    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* ============================================
           ROOM ENVIRONMENT
           ============================================ */
        .room {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 50%, #0a0a0a 100%);
            position: relative;
            padding: 20px;
        }

        .room::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(233, 69, 96, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================
           TV SECTION (SAMSUNG)
           ============================================ */
        .tv-section {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto 30px;
            text-align: center;
        }

        .tv-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px 20px;
            background: #000;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .tv-brand img {
            height: 24px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .tv-brand span {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tv-frame {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 
                0 0 40px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid #222;
            position: relative;
        }

        .tv-screen {
            background: #000;
            border-radius: 4px;
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        .tv-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.03) 0%,
                transparent 10%,
                transparent 90%,
                rgba(255,255,255,0.03) 100%
            );
            pointer-events: none;
        }

        /* Bass OS Interface on TV */
        .bass-os-tv {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a1628 0%, #1a0a28 50%, #0a0a1a 100%);
        }

        .bass-os-tv .logo-big {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .bass-os-tv .subtitle {
            font-size: 14px;
            color: #00ff88;
            opacity: 0.7;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .bass-os-tv .visualizer-tv {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
        }

        .bar-tv {
            width: 6px;
            background: linear-gradient(180deg, #00ff88, #00ccff);
            border-radius: 2px 2px 0 0;
            transition: height 0.05s ease;
            opacity: 0.8;
        }

        /* ============================================
           HEAD UNIT / MAGNITOLA (Bass OS)
           ============================================ */
        .head-unit-section {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .head-unit {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid #2a2a3e;
            position: relative;
        }

        .head-unit::before {
            content: 'BASS OS';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #000;
            padding: 4px 20px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 3px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        /* Screen */
        .hu-screen {
            background: #000;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #1a1a2e;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
            position: relative;
            overflow: hidden;
        }

        .hu-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            opacity: 0.3;
        }

        /* Display content */
        .display-main {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .track-info {
            text-align: center;
        }

        .track-name {
            font-size: 18px;
            color: #00ff88;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .track-artist {
            font-size: 12px;
            color: #666;
        }

        /* Power meter */
        .power-section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #1a1a2e;
        }

        .power-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .power-label span:first-child {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .power-value {
            font-size: 24px;
            font-weight: 900;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .power-value.warning {
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        .power-value.danger {
            color: #ff4444;
            text-shadow: 0 0 15px rgba(255, 68, 68, 0.6);
            animation: pulse-danger 0.5s ease infinite alternate;
        }

        @keyframes pulse-danger {
            from { opacity: 1; }
            to { opacity: 0.6; }
        }

        /* Power bar */
        .power-bar-container {
            height: 8px;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .power-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.1s ease, background 0.3s ease;
            position: relative;
        }

        .power-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .power-bar-fill.safe { background: linear-gradient(90deg, #00ff88, #00ccff); }
        .power-bar-fill.warning { background: linear-gradient(90deg, #ffaa00, #ff8800); }
        .power-bar-fill.danger { background: linear-gradient(90deg, #ff4444, #ff0000); }

        /* Max power marker */
        .max-power-marker {
            position: absolute;
            top: -2px;
            bottom: -2px;
            width: 2px;
            background: #ff4444;
            z-index: 2;
        }

        .max-power-label {
            position: absolute;
            top: -18px;
            transform: translateX(-50%);
            font-size: 9px;
            color: #ff4444;
            white-space: nowrap;
        }

        /* Status indicator */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px currentColor;
            transition: all 0.3s ease;
        }

        .status-dot.warning { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; animation: blink 1s infinite; }
        .status-dot.danger { background: #ff4444; box-shadow: 0 0 12px #ff4444; animation: blink 0.3s infinite; }
        .status-dot.smoke { background: #888; box-shadow: 0 0 8px #888; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Sub temp */
        .temp-display {
            font-size: 11px;
            color: #666;
        }

        .temp-display span {
            color: #ff8800;
            font-weight: 600;
        }

        /* Controls */
        .hu-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .hu-btn {
            background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 1px solid #3a3a4e;
            border-radius: 10px;
            padding: 15px 10px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .hu-btn:hover {
            background: linear-gradient(180deg, #3a3a4e 0%, #2a2a3e 100%);
            border-color: #00ff88;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2);
        }

        .hu-btn:active {
            transform: translateY(0);
        }

        .hu-btn .icon {
            font-size: 20px;
        }

        .hu-btn.play-pause.active {
            background: linear-gradient(180deg, #00ff88 0%, #00cc66 100%);
            color: #000;
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* Power Slider */
        .slider-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1a1a2e;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .power-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: #111;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .power-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            border: 2px solid #fff;
            transition: transform 0.2s ease;
        }

        .power-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .power-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .slider-marks {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 10px;
            color: #444;
        }

        /* ============================================
           AMPLIFIER SECTION (JBL)
           ============================================ */
        .amp-section {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto 40px;
            text-align: center;
        }

        .amp-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .amp-brand img {
            height: 30px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .amp-brand span {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .amplifier {
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #2a2a2a;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .amp-heat-sinks {
            display: flex;
            gap: 3px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .heat-sink {
            width: 12px;
            height: 40px;
            background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
            border-radius: 2px;
        }

        .amp-leds {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .led-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #222;
            border: 2px solid #333;
            transition: all 0.3s ease;
            position: relative;
        }

        .led.power {
            background: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            border-color: #00ff88;
        }

        .led.protect {
            background: #222;
            border-color: #333;
        }

        .led.protect.active {
            background: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.8);
            border-color: #ff4444;
            animation: protect-blink 0.2s infinite;
        }

        @keyframes protect-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .led-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .amp-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .amp-stat {
            text-align: center;
        }

        .amp-stat-value {
            font-size: 20px;
            font-weight: 900;
            color: #00ff88;
            font-family: 'Courier New', monospace;
        }

        .amp-stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ============================================
           SUBWOOFER SECTION (PRIDE)
           ============================================ */
        .sub-section {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto 40px;
            text-align: center;
        }

        .sub-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sub-brand img {
            height: 30px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .sub-brand span {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subwoofer-container {
            position: relative;
            display: inline-block;
        }

        .subwoofer {
            width: 350px;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 3px solid #2a2a2a;
        }

        .subwoofer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.05s ease;
        }

        .subwoofer.vibrating img {
            animation: sub-vibrate 0.05s infinite;
        }

        @keyframes sub-vibrate {
            0% { transform: scale(1) translate(0, 0); }
            25% { transform: scale(1.02) translate(-1px, 1px); }
            50% { transform: scale(1) translate(1px, -1px); }
            75% { transform: scale(1.02) translate(-1px, -1px); }
            100% { transform: scale(1) translate(1px, 1px); }
        }

        /* Smoke effect */
        .smoke-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 10;
        }

        .smoke-overlay.active {
            opacity: 1;
        }

        .smoke-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(150, 150, 150, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: smoke-rise 3s infinite;
        }

        @keyframes smoke-rise {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-200px) scale(3);
                opacity: 0;
            }
        }

        /* Sparks */
        .sparks {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 11;
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffaa00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffaa00;
            animation: spark-fly 0.5s ease-out forwards;
        }

        @keyframes spark-fly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Burn mark */
        .burn-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(50, 30, 10, 0.9) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
            z-index: 9;
        }

        .burn-mark.active {
            opacity: 1;
        }

        /* Replace button */
        .replace-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.5);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: replace-pulse 1s infinite;
        }

        .replace-btn.show {
            transform: translate(-50%, -50%) scale(1);
        }

        @keyframes replace-pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 10px 40px rgba(255, 68, 68, 0.8); }
        }

        .replace-btn:hover {
            background: linear-gradient(135deg, #ff6666, #ff0000);
        }

        /* ============================================
           SPEAKERS SECTION (FIERO)
           ============================================ */
        .speakers-section {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto 40px;
            text-align: center;
        }

        .speakers-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .speakers-brand img {
            height: 30px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .speakers-brand span {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .speakers-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .speaker-unit {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 3px solid #2a2a2a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .speaker-unit::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid #333;
        }

        .speaker-unit::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: #111;
            border: 1px solid #333;
        }

        .speaker-unit.vibrating {
            animation: speaker-pump 0.1s infinite;
        }

        @keyframes speaker-pump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .speaker-label {
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ============================================
           OSCILLOSCOPE
           ============================================ */
        .scope-section {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .scope-title {
            text-align: center;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .oscilloscope {
            background: #000;
            border-radius: 8px;
            height: 120px;
            border: 1px solid #1a1a2e;
            position: relative;
            overflow: hidden;
        }

        .oscilloscope::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(0, 255, 136, 0.1);
        }

        .scope-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ============================================
           WARNING BEEP INDICATOR
           ============================================ */
        .beep-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 68, 68, 0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
        }

        .beep-indicator.show {
            transform: translateX(0);
        }

        .beep-indicator::before {
            content: '🔊 ';
        }

        /* ============================================
           SCREEN SHAKE
           ============================================ */
        .screen-shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, 2px); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 600px) {
            .subwoofer {
                width: 280px;
                height: 280px;
            }
            
            .hu-controls {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .tv-brand img, .amp-brand img, .sub-brand img, .speakers-brand img {
                height: 20px;
            }
        }

        /* ============================================
           HIDDEN STATE
           ============================================ */
        .hidden {
            display: none !important;
        }
    </style>
</head>

    <script>
        // ============================================
        // AUDIO ENGINE
        // ============================================
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let analyser = null;
        let isPlaying = false;
        let currentFrequency = 35;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
            }
        }

        function playTone(freq, volume) {
            initAudio();
            stopTone();
            
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(volume * 0.3, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            oscillator.start();
            isPlaying = true;
            updatePlayButton();
        }

        function stopTone() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
            }
            isPlaying = false;
            updatePlayButton();
        }

        function updatePlayButton() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                btn.classList.add('active');
                btn.querySelector('.icon').textContent = '⏸';
                btn.querySelector('span:last-child').textContent = 'Pause';
            } else {
                btn.classList.remove('active');
                btn.querySelector('.icon').textContent = '▶';
                btn.querySelector('span:last-child').textContent = 'Play';
            }
        }

        function togglePlay() {
            if (isPlaying) {
                stopTone();
            } else {
                if (isDead) {
                    replaceSub();
                    return;
                }
                playTone(currentFrequency, currentPower / 19000);
            }
        }

        // ============================================
        // SYSTEM STATE
        // ============================================
        let currentPower = 0;
        let maxSubPower = 15000;
        let isOverloaded = false;
        let isDead = false;
        let beepInterval = null;
        let protectInterval = null;
        let tempInterval = null;
        let subTemp = 35;
        let volume = 50;
        let bassLevel = 0;
        let demoMode = false;

        // ============================================
        // POWER CONTROL
        // ============================================
        function updatePower(value) {
            if (isDead) return;
            
            currentPower = parseInt(value);
            document.getElementById('powerSlider').value = currentPower;
            document.getElementById('sliderValue').textContent = currentPower + 'W';
            document.getElementById('powerValue').textContent = currentPower + ' W';
            document.getElementById('ampWatts').textContent = currentPower;
            
            // Update power bar
            const percentage = (currentPower / 19000) * 100;
            const bar = document.getElementById('powerBar');
            bar.style.width = percentage + '%';
            
            // Update color
            const valueDisplay = document.getElementById('powerValue');
            if (currentPower > 15000) {
                bar.className = 'power-bar-fill danger';
                valueDisplay.className = 'power-value danger';
            } else if (currentPower > 12000) {
                bar.className = 'power-bar-fill warning';
                valueDisplay.className = 'power-value warning';
            } else {
                bar.className = 'power-bar-fill safe';
                valueDisplay.className = 'power-value';
            }
            
            // Update status
            updateStatus();
            
            // Check overload
            if (currentPower > 15000 && !isOverloaded && !isDead) {
                triggerOverload();
            } else if (currentPower <= 15000 && isOverloaded && !isDead) {
                clearOverload();
            }
            
            // Update audio volume if playing
            if (isPlaying && gainNode) {
                gainNode.gain.setValueAtTime((currentPower / 19000) * 0.3, audioCtx.currentTime);
            }
            
            // Update vibration
            updateVibration();
        }

        function updateStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (isDead) {
                dot.className = 'status-dot smoke';
                text.textContent = 'DEAD';
                text.style.color = '#888';
            } else if (isOverloaded) {
                dot.className = 'status-dot danger';
                text.textContent = 'PROTECT';
                text.style.color = '#ff4444';
            } else if (currentPower > 12000) {
                dot.className = 'status-dot warning';
                text.textContent = 'HOT';
                text.style.color = '#ffaa00';
            } else {
                dot.className = 'status-dot';
                text.textContent = 'OK';
                text.style.color = '#00ff88';
            }
        }

        // ============================================
        // OVERLOAD SYSTEM
        // ============================================
        function triggerOverload() {
            isOverloaded = true;
            
            // Start beeping every 10 seconds
            if (!beepInterval) {
                beepInterval = setInterval(() => {
                    if (isDead) return;
                    playBeep();
                }, 10000);
                playBeep(); // First beep immediately
            }
            
            // Start protect LED blinking
            document.getElementById('protectLed').classList.add('active');
            
            // Start temperature rise
            if (!tempInterval) {
                tempInterval = setInterval(() => {
                    if (subTemp < 200 && !isDead) {
                        subTemp += 5;
                        document.getElementById('subTemp').textContent = subTemp + '°C';
                        
                        if (subTemp >= 150) {
                            killSub();
                        }
                    }
                }, 500);
            }
        }

        function playBeep() {
            if (!audioCtx) initAudio();
            
            const beepOsc = audioCtx.createOscillator();
            const beepGain = audioCtx.createGain();
            
            beepOsc.type = 'square';
            beepOsc.frequency.setValueAtTime(2000, audioCtx.currentTime);
            beepGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            beepGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            beepOsc.connect(beepGain);
            beepGain.connect(audioCtx.destination);
            
            beepOsc.start();
            beepOsc.stop(audioCtx.currentTime + 1);
            
            // Show warning
            const indicator = document.getElementById('beepIndicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 1000);
            
            // Screen shake
            document.getElementById('huScreen').classList.add('screen-shake');
            setTimeout(() => document.getElementById('huScreen').classList.remove('screen-shake'), 200);
        }

        function clearOverload() {
            isOverloaded = false;
            
            if (beepInterval) {
                clearInterval(beepInterval);
                beepInterval = null;
            }
            
            document.getElementById('protectLed').classList.remove('active');
            
            if (tempInterval) {
                clearInterval(tempInterval);
                tempInterval = null;
            }
            
            // Cool down
            const coolDown = setInterval(() => {
                if (subTemp > 35 && currentPower <= 15000) {
                    subTemp -= 2;
                    document.getElementById('subTemp').textContent = subTemp + '°C';
                } else {
                    clearInterval(coolDown);
                }
            }, 300);
        }

        // ============================================
        // KILL SUB (SMOKE & FIRE)
        // ============================================
        function killSub() {
            if (isDead) return;
            isDead = true;
            isOverloaded = false;
            
            // Stop music
            stopTone();
            
            // Clear intervals
            if (beepInterval) clearInterval(beepInterval);
            if (tempInterval) clearInterval(tempInterval);
            
            // Final beep
            playBeep();
            
            // Stop protect LED
            document.getElementById('protectLed').classList.remove('active');
            
            // Show smoke
            const smokeOverlay = document.getElementById('smokeOverlay');
            smokeOverlay.classList.add('active');
            createSmoke();
            
            // Create sparks
            createSparks();
            
            // Show burn mark
            setTimeout(() => {
                document.getElementById('burnMark').classList.add('active');
            }, 1000);
            
            // Show replace button
            setTimeout(() => {
                document.getElementById('replaceBtn').classList.add('show');
            }, 2000);
            
            // Update display
            document.getElementById('trackName').textContent = 'SUB DESTROYED';
            document.getElementById('trackName').style.color = '#ff4444';
            updateStatus();
            
            // Stop vibration
            document.getElementById('subwoofer').classList.remove('vibrating');
            document.querySelectorAll('.speaker-unit').forEach(s => s.classList.remove('vibrating'));
        }

        function createSmoke() {
            const overlay = document.getElementById('smokeOverlay');
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'smoke-particle';
                    particle.style.left = (30 + Math.random() * 40) + '%';
                    particle.style.bottom = (20 + Math.random() * 30) + '%';
                    particle.style.width = (20 + Math.random() * 40) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.animationDelay = (Math.random() * 2) + 's';
                    particle.style.animationDuration = (2 + Math.random() * 2) + 's';
                    overlay.appendChild(particle);
                }, i * 200);
            }
        }

        function createSparks() {
            const container = document.getElementById('sparks');
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = (40 + Math.random() * 20) + '%';
                    spark.style.top = (40 + Math.random() * 20) + '%';
                    spark.style.setProperty('--tx', (Math.random() * 100 - 50) + 'px');
                    spark.style.setProperty('--ty', (Math.random() * 100 - 50) + 'px');
                    container.appendChild(spark);
                    
                    setTimeout(() => spark.remove(), 500);
                }, i * 100);
            }
        }

        // ============================================
        // REPLACE SUB
        // ============================================
        function replaceSub() {
            isDead = false;
            isOverloaded = false;
            subTemp = 35;
            currentPower = 0;
            
            // Reset UI
            document.getElementById('smokeOverlay').innerHTML = '';
            document.getElementById('smokeOverlay').classList.remove('active');
            document.getElementById('burnMark').classList.remove('active');
            document.getElementById('replaceBtn').classList.remove('show');
            document.getElementById('sparks').innerHTML = '';
            
            document.getElementById('trackName').textContent = 'Bass Test - 30Hz';
            document.getElementById('trackName').style.color = '#00ff88';
            
            document.getElementById('powerSlider').value = 0;
            updatePower(0);
            
            updateStatus();
        }

        // ============================================
        // VIBRATION CONTROL
        // ============================================
        function updateVibration() {
            const sub = document.getElementById('subwoofer');
            const speakers = document.querySelectorAll('.speaker-unit');
            
            if (isPlaying && currentPower > 0 && !isDead) {
                const intensity = currentPower / 19000;
                
                if (intensity > 0.3) {
                    sub.classList.add('vibrating');
                    speakers.forEach(s => s.classList.add('vibrating'));
                    
                    // Adjust animation speed based on power
                    const duration = Math.max(0.02, 0.1 - (intensity * 0.08));
                    sub.style.animationDuration = duration + 's';
                } else {
                    sub.classList.remove('vibrating');
                    speakers.forEach(s => s.classList.remove('vibrating'));
                }
            } else {
                sub.classList.remove('vibrating');
                speakers.forEach(s => s.classList.remove('vibrating'));
            }
        }

        // ============================================
        // CONTROLS
        // ============================================
        function changeVolume(delta) {
            volume = Math.max(0, Math.min(100, volume + delta));
            if (isPlaying && gainNode) {
                gainNode.gain.setValueAtTime((volume / 100) * (currentPower / 19000) * 0.3, audioCtx.currentTime);
            }
        }

        function changeBass(delta) {
            bassLevel = Math.max(-10, Math.min(10, bassLevel + delta));
            if (isPlaying && oscillator) {
                const baseFreq = 35;
                const newFreq = baseFreq + (bassLevel * 2);
                oscillator.frequency.setValueAtTime(newFreq, audioCtx.currentTime);
            }
        }

        function resetSystem() {
            stopTone();
            clearOverload();
            if (isDead) replaceSub();
            currentPower = 0;
            document.getElementById('powerSlider').value = 0;
            updatePower(0);
            demoMode = false;
        }

        function toggleDemo() {
            demoMode = !demoMode;
            if (demoMode) {
                let power = 0;
                let direction = 1;
                const demoInterval = setInterval(() => {
                    if (!demoMode || isDead) {
                        clearInterval(demoInterval);
                        return;
                    }
                    power += direction * 200;
                    if (power >= 14000) direction = -1;
                    if (power <= 0) direction = 1;
                    updatePower(power);
                }, 50);
            }
        }

        // ============================================
        // OSCILLOSCOPE
        // ============================================
        function drawOscilloscope() {
            const canvas = document.getElementById('scopeCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const bufferLength = analyser ? analyser.frequencyBinCount : 128;
            const dataArray = new Uint8Array(bufferLength);
            
            function draw() {
                requestAnimationFrame(draw);
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (!analyser || !isPlaying) {
                    // Draw flat line
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height / 2);
                    ctx.lineTo(canvas.width, canvas.height / 2);
                    ctx.stroke();
                    return;
                }
                
                analyser.getByteTimeDomainData(dataArray);
                
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff88';
                ctx.beginPath();
                
                const sliceWidth = canvas.width / bufferLength;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = (v * canvas.height) / 2;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                    
                    x += sliceWidth;
                }
                
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            
            draw();
        }

        // ============================================
        // TV VISUALIZER
        // ============================================
        function createTVVisualizer() {
            const container = document.getElementById('tvVisualizer');
            container.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar-tv';
                bar.style.height = '5px';
                container.appendChild(bar);
            }
        }

        function updateTVVisualizer() {
            const bars = document.querySelectorAll('.bar-tv');
            if (!isPlaying) {
                bars.forEach(bar => bar.style.height = '5px');
                return;
            }
            
            const intensity = currentPower / 19000;
            bars.forEach((bar, i) => {
                const height = Math.random() * 50 * intensity + 5;
                bar.style.height = height + 'px';
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        window.onload = function() {
            createTVVisualizer();
            drawOscilloscope();
            
            // Update visualizer
            setInterval(updateTVVisualizer, 50);
            
            // Update amps calculation
            setInterval(() => {
                const amps = currentPower > 0 ? (currentPower / 14.4).toFixed(1) : 0;
                document.getElementById('ampAmps').textContent = amps;
            }, 200);
        };

        // Handle window resize
        window.addEventListener('resize', () => {
            drawOscilloscope();
        });
    </script>
</body>
</html>
