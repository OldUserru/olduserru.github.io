<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт переходник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
            display: block;
            background: #ddd;
        }
        
        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        .link {
            display: block;
            padding: 15px 20px;
            margin: 10px 0;
            background: #f0f0f0;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .windows-link {
            display: block;
            padding: 15px 20px;
            margin: 10px 0;
            background: linear-gradient(135deg, #0078d4 0%, #106ebe 100%);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .windows-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 120, 212, 0.5);
        }
        
        .peak-link {
            display: block;
            padding: 15px 20px;
            margin: 10px 0;
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            border-radius: 12px;
            text-decoration: none;
            color: #00d2d3;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .peak-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 210, 211, 0.4);
        }
        
        .sub-link {
            display: block;
            padding: 15px 20px;
            margin: 10px 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            text-decoration: none;
            color: #ff6b6b;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .sub-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        .note {
            margin-top: 20px;
            color: #888;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .footer {
            margin-top: 15px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="preview.jpg" alt="Avatar" class="avatar" onerror="this.style.display='none'">
        <h1>Aqvich</h1>
        <div class="subtitle">Сайт переходник</div>
        
        <a href="bassplayer.html" class="link">Bass Player</a>
        <a href="windowsdownloader.html" class="windows-link">Windows 11 ISO</a>
        <a href="https://forms.gle/CN3THF1RBJMLkR9b8" class="peak-link">Предложка</a>
        <a href="subwoofer_simulator.html" class="sub-link">Sub simulator</a>
        
        <div class="note">Подходит для Ростелекома, МТС, Билайн, Дом.ру и других провайдеров</div>
        
        <div class="footer">Made with ❤️</div>
    </div>
</body>
</html>
