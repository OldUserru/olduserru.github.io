<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bass Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .card:hover {
            transform: scale(1.02);
        }
        
        .preview {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        
        .content {
            padding: 25px;
        }
        
        .title {
            color: #e94560;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        
        .arrow {
            margin-top: 15px;
            color: #e94560;
            font-size: 20px;
            transition: transform 0.3s ease;
        }
        
        .card:hover .arrow {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <a href="bassplayer.html" class="card">
        <img src="preview.png" alt="Bass Player Preview" class="preview">
        <div class="content">
            <div class="title">🎸 Bass Player</div>
            <div class="subtitle">Нажмите, чтобы открыть</div>
            <div class="arrow">→</div>
        </div>
    </a>
</body>
</html>
